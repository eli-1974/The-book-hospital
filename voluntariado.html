<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleButton = document.querySelector('.menu-toggle');
        const navList = document.querySelector('.header_lista');
        const menuIcon = toggleButton.querySelector('i');

        toggleButton.addEventListener('click', function() {
            // Alterna la clase 'open' en la lista de enlaces
            navList.classList.toggle('open');

            // Alterna el icono entre hamburguesa y X
            if (navList.classList.contains('open')) {
                menuIcon.classList.remove('fa-bars');
                menuIcon.classList.add('fa-xmark'); // Icono de cerrar (X)
            } else {
                menuIcon.classList.remove('fa-xmark');
                menuIcon.classList.add('fa-bars'); // Icono de hamburguesa
            }

            // Opcional: Cierra el menú al hacer clic en un enlace (útil para Single Page Apps)
            const navLinks = navList.querySelectorAll('.header_lista_enlaces');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navList.classList.remove('open');
                    menuIcon.classList.remove('fa-xmark');
                    menuIcon.classList.add('fa-bars');
                });
            });

        });
    });
</script>
